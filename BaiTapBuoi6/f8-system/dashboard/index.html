<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        .title {
            color: yellowgreen;
        }

        #special {
            color: aqua;
        }

        .highlight {
            color: blueviolet
        }

        .big {
            color: gold;
        }
    </style>
</head>

<body>
    <!--
        Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style
        h1 se an mau cua inline style vi no co do uu tien cao nhat
        Mau hien thi: forestgreen
    -->
    <h1 class="title" id="special" style="color: forestgreen;">DASHBOARD</h1>
    <h2 class="section" style="color: forestgreen;">Tong quan he thong</h2>
    <div class="big">
        <h3 class="title">Courses</h3>
        <p class="highlight">Đây là Courses </p>
        <h3 class="title">Students</h3>
        <p class="highlight">Đây là Students </p>
        <h3 class="title">Teachers</h3>
        <p class="highlight">Đây là Teachers </p>
        <h3 class="title">Orders</h3>
        <p class="highlight">Đây là Orders </p>
        <h3 class="title">Reports</h3>
        <p class="highlight">Đây là Reports </p>
    </div>

</body>

</html>
